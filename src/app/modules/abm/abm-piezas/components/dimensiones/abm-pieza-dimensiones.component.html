<div class="relative w-full sm:w-1/2 py-4">
  <div *ngIf="isLoading" class="absolute inset-0 bg-white bg-opacity-75 z-20 flex items-center justify-center">
    <mat-progress-spinner color="primary" mode="indeterminate"></mat-progress-spinner>
  </div>

  <form [formGroup]="dimensionesForm" class="mat-form-without-wrapper">
    <!-- Shape Selection -->
    <div class="mb-8 flex items-center gap-8">
      <span class="font-bold text-slate-700 uppercase text-xs tracking-wider">Forma:</span>
      <mat-radio-group formControlName="forma" class="flex gap-10">
        <mat-radio-button value="RECTANGULAR" color="accent" [disabled]="mode === 'view'">
          <span class="text-slate-700 font-medium">Rectangular</span>
        </mat-radio-button>
        <mat-radio-button value="CIRCULAR" color="accent" [disabled]="mode === 'view'">
          <span class="text-slate-700 font-medium">Circular</span>
        </mat-radio-button>
      </mat-radio-group>
    </div>

    <!-- Dimensions List -->
    <div  formArrayName="dimensiones">
      <div *ngFor="let dim of dimensionesArray.controls; let i=index" [formGroupName]="i"
        class="bg-white py-2 pb-4 transition-all border-t border-slate-200 ">

        <div class="flex items-center gap-6">
          <!-- Control Toggle -->
          <div class="flex flex-col items-center border-r border-slate-200 pr-6">
            <span class="text-[10px] uppercase font-bold text-slate-400 mb-2">Controlar</span>
            <mat-slide-toggle formControlName="controlar" color="accent"
              [disabled]="mode === 'view'"></mat-slide-toggle>
          </div>

          <!-- Inputs Grid -->
          <div class="flex-grow grid grid-cols-1 md:grid-cols-12 gap-4 pt-2">
            <!-- Main Value -->
            <div [class]="dim.get('tipo').value === 'PROFUNDIDAD' ? 'md:col-span-12' : 'md:col-span-3'">
              <mat-form-field appearance="outline" class="w-full">
                <mat-label>{{ dim.get('tipo').value }} (mm)</mat-label>
                <input matInput type="number" step="0.001" formControlName="valor" placeholder="0.000"
                  [readonly]="mode === 'view'">
              </mat-form-field>
            </div>

            <!-- Margin & Tol (Hidden for PROFUNDIDAD) -->
            <ng-container *ngIf="dim.get('tipo').value !== 'PROFUNDIDAD'">
              <div class="md:col-span-3">
                <mat-form-field appearance="outline" class="w-full">
                  <mat-label>Margen (±)</mat-label>
                  <input matInput type="number" step="0.01" formControlName="margen" placeholder="± mm"
                    [readonly]="mode === 'view'">
                </mat-form-field>
              </div>

              <div class="md:col-span-3">
                <mat-form-field appearance="outline" class="w-full">
                  <mat-label>Mínimo</mat-label>
                  <input matInput type="number" step="0.001" formControlName="minimo" (input)="clearMargen(dim)"
                    [readonly]="mode === 'view'">
                </mat-form-field>
              </div>

              <div class="md:col-span-3">
                <mat-form-field appearance="outline" class="w-full">
                  <mat-label>Máximo</mat-label>
                  <input matInput type="number" step="0.001" formControlName="maximo" (input)="clearMargen(dim)"
                    [readonly]="mode === 'view'">
                </mat-form-field>
              </div>
            </ng-container>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
